<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <style>
      .container{
        display: flex;
        flex-wrap: wrap;
        gap: 50px;
        justify-content: center;
        align-items: center;
        margin-top: 10px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container" id="product_container"></div>
  </body>
  <script>
    async function ProductData() {
      try {
        let response = await fetch("https://dummyjson.com/products");
        let data = await response.json();
        displayProducts(data.products); //products name ki key ke ander array aa raha h array name ki key ke upar hi loop chala paenge
        console.log(data);
      } catch (error) {
        console.log(error);
      } //try block se data nikalne ke liye ek function banna rahi hu.
      function displayProducts(value) {
        let html = "";
        value.forEach((items) => {
          console.log(items);

          html += `
            <div class="card" style="width: 18rem;">
            <img src="${items.thumbnail}" class="card-img-top" alt="...">
            <div class="card-body">
            <h5 class="card-title">${items.title}</h5>
            <p class="card-text">${items.description}</p>
            <a href="#" class="btn btn-primary">${items.price}</a>
            <button="btn btn-secondary">${items.rating}</button> 
            </div>
        </div>
            `;
        });
        document.getElementById("product_container").innerHTML = html
      } //data per loop chala rahi hu.
    }

    ProductData();
  </script>
</html>
